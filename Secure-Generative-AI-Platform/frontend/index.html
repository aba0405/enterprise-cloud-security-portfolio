<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Secure Generative AI Platform</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>Secure Generative AI Platform</h1>

    <p class="subtitle">
        Enterprise-grade Generative AI secured using AWS native security services.
    </p>

    <div class="buttons">

        <button id="loginBtn">
            Sign In
        </button>

        <button id="logoutBtn" style="display:none;">
            Logout
        </button>

    </div>

    <div id="chatContainer" style="display:none; margin-top:30px;">

        <textarea
            id="prompt"
            rows="5"
            style="width:100%;padding:15px;"
            placeholder="Ask anything..."></textarea>

        <br><br>

        <button id="sendBtn">
            Send
        </button>

        <br><br>

        <div
            id="response"
            style="
                text-align:left;
                background:#f5f5f5;
                padding:20px;
                border-radius:8px;
                min-height:120px;">
        </div>

    </div>

    <div class="status">

        Secure AI Platform

    </div>

</div>

<script src="js/app.js"></script>

</body>

</html>
