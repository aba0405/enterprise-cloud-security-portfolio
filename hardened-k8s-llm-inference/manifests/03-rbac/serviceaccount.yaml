# serviceaccount.yaml
# Dedicated identity for the LLM inference workload.
# automountServiceAccountToken: false — the app doesn't call the K8s API,
# so it should NOT carry a token an attacker could steal. Least privilege
# starts with "no credential at all unless you need one."
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-inference-sa
  namespace: llm-inference
automountServiceAccountToken: false
